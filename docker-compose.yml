services:
  memory:
    build: .
    platform: linux/amd64
    ports:
      - "8080:8080"
    volumes:
      - memory_data:/app/data
    env_file:
      - .env
    environment:
      # Lean default — turn rewriting is off (~1s saved per /turns).
      # Subject-rule prompt covers the same failure modes more cheaply.
      # Set to empty string in .env to enable.
      DISABLE_TURN_REWRITE: "1"
    restart: unless-stopped

volumes:
  memory_data:
